<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GreenRoute AI</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>GreenRoute AI</h1>
<p>Sustainable Route Optimization System</p>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="user" placeholder="Enter name..." />
  <button onclick="enterSystem()">Enter System</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="controls">
    <button onclick="runDashboard('eco')">Eco</button>
    <button onclick="runDashboard('fast')">Fast</button>
    <button onclick="runDashboard('balanced')">Balanced</button>
  </div>

  <div class="section">
    <h2>Output</h2>
    <pre id="outputBox"></pre>
  </div>

  <div class="section">
    <h2>Carbon</h2>
    <h1 id="co2Counter"></h1>
  </div>

  <div class="section">
    <h2>Comparison</h2>
    <pre id="comparisonBox"></pre>
  </div>

  <div class="section">
    <h2>Chart</h2>
    <div id="chartContainer"></div>
  </div>

  <div class="section">
    <h2>Map</h2>
    <div id="mapBox"></div>
  </div>

  <div class="section">
    <h2>Explanation</h2>
    <pre id="explanationBox"></pre>
  </div>

  <div class="section">
    <h2>Carbon Savings</h2>
    <pre id="carbonBox"></pre>
  </div>

  <div class="section">
    <button onclick="exportPDF()">Export Report</button>
  </div>

</div>

<!-- ONLY EXTERNAL SCRIPTS -->
<script src="dataset.js"></script>
<script src="engine.js"></script>
<script src="output.js"></script>
<script src="comparison.js"></script>
<script src="explanation.js"></script>
<script src="app.js"></script>

</body>
</html>
